<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e1b4b" />
    </linearGradient>
    
    <!-- Gold Premium Gradient -->
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="50%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>

    <!-- Tricolor Accents Gradients -->
    <linearGradient id="saffron-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff9933" />
      <stop offset="100%" stop-color="#ff6600" />
    </linearGradient>
    
    <linearGradient id="green-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#128807" />
      <stop offset="100%" stop-color="#0b6603" />
    </linearGradient>
    
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Base with rounded corner mask -->
  <rect width="512" height="512" rx="112" fill="url(#bg-grad)" />
  <rect x="4" y="4" width="504" height="504" rx="108" fill="none" stroke="url(#gold-grad)" stroke-width="4" opacity="0.4" />

  <!-- Tricolor Saffron Glow at top-left, Green Glow at bottom-right -->
  <circle cx="96" cy="96" r="64" fill="url(#saffron-grad)" opacity="0.25" filter="url(#glow)" />
  <circle cx="416" cy="416" r="64" fill="url(#green-grad)" opacity="0.25" filter="url(#glow)" />

  <!-- Central Emblem: Sleek Geometric 'A' for Alvon -->
  <g transform="translate(116, 106)" filter="url(#glow)">
    <!-- Right leg of A (Emerald Green Accent) -->
    <path d="M 140,0 L 280,300 L 210,300 L 140,150 Z" fill="url(#green-grad)" opacity="0.9" />
    
    <!-- Left leg of A (Saffron Accent) -->
    <path d="M 140,0 L 0,300 L 70,300 L 140,150 Z" fill="url(#saffron-grad)" opacity="0.9" />
    
    <!-- Horizontal bridge of A (Pure White / Silver Accent) -->
    <path d="M 70,200 L 210,200 L 225,230 L 55,230 Z" fill="#ffffff" opacity="0.95" />
    
    <!-- Golden Core / Coin motif inside the bridge representing Alvon Coins -->
    <circle cx="140" cy="215" r="24" fill="url(#gold-grad)" stroke="#ffffff" stroke-width="3" />
    <!-- Small star inside golden core -->
    <path d="M 140,207 L 142,212 L 147,212 L 143,215 L 145,220 L 140,217 L 135,220 L 137,215 L 133,212 L 138,212 Z" fill="#ffffff" />
  </g>
  
  <!-- "Alvon" elegant minimalist subtitle text -->
  <text x="256" y="465" font-family="'Space Grotesk', 'Inter', sans-serif" font-weight="900" font-size="38" fill="#ffffff" letter-spacing="8" text-anchor="middle" opacity="0.95">ALVON</text>
  <text x="256" y="492" font-family="'JetBrains Mono', monospace" font-weight="700" font-size="12" fill="url(#gold-grad)" letter-spacing="4" text-anchor="middle" opacity="0.8">SUPER APP</text>
</svg>
